            font-size: 0.8rem;

            border: 1px solid var(--card-border);
            cursor: pointer;
            transition: 0.2s;
            position: relative;
            overflow: hidden;

        .card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 6px;
            height: 100%;
            background: linear-gradient(180deg, #2b9b72, #1d6e54);
            opacity: 0;
            transition: opacity 0.2s;

            color: var(--link-color);

            padding: 12px 16px;
            border-radius: 20px;
            margin: 1.2em 0;

        .warning-box {
            background: var(--warning-bg);
            border-left: 4px solid #f0a500;
            padding: 12px 16px;
            border-radius: 20px;

            right: 20px;

    </style>
</head>

            title: "📞 Contact Manager",
            meta: "Telegram / Signal support",
            content: `<p><a href="https://t.me/lela303" class="contact-link">📱 Telegram Manager</a> <a href="https://signal.me/#eu/tXcYkeU9bWBQIzut_QGqiNT_fwwvJ1O-lFEKcJADXGy5PB9T_S9MiritEYbdHymQ" class="contact-link">🔒 Signal Manager</a></p><p>🕒 Working hours: 10am – 10pm (PNG time). Your manager assists with deposits, withdrawals, tasks, upgrades, and any questions.</p>`
        }
    };

    // Category configuration – English, all cards included
    const CARD_CATEGORIES = [
        { name: "💰 Compensation & Benefits", items: ["deposit-earnings", "extra-earnings", "withdrawal-rules", "topup-steps"] },
        { name: "🏢 About PG", items: ["what-is-pg", "why-safe"] },
        { name: "📋 How‑To Guides", items: ["order-process", "shipping-address"] },
        { name: "👥 Team & Invitations", items: ["invite-friends"] },
        { name: "📞 Support", items: ["contact-manager"] }
    ];

    // Flat list for rendering cards in order
    const FLAT_CARDS = [];
    for (const cat of CARD_CATEGORIES) {
        for (const id of cat.items) {
            FLAT_CARDS.push({ id, title: ARTICLES[id].title, desc: ARTICLES[id].meta });
        }
    }

    const homeContainer = document.getElementById('homeContainer');
    const detailContainer = document.getElementById('detailContainer');
    const cardsArea = document.getElementById('cardsArea');
    const detailContentDiv = document.getElementById('detailContent');
    const backBtn = document.getElementById('backHomeBtn');
    const tocContainer = document.getElementById('tocContainer');

    function renderCards() {
        cardsArea.innerHTML = '';
        for (const card of FLAT_CARDS) {
            const article = ARTICLES[card.id];
            const shortDesc = article?.meta || card.desc;
            const cardElem = document.createElement('div');
            cardElem.className = 'card';
            cardElem.id = `card-${card.id}`;
            cardElem.innerHTML = `<h3>${card.title}</h3><p>${shortDesc}</p><div class="badge">📘 Tap to expand →</div>`;
            cardElem.addEventListener('click', () => showDetail(card.id));
            cardsArea.appendChild(cardElem);
        }
        generateTOC();
    }

    function generateTOC() {
        tocContainer.innerHTML = '';
        for (const cat of CARD_CATEGORIES) {
            const categoryDiv = document.createElement('div');
            categoryDiv.className = 'toc-category';
            const headerDiv = document.createElement('div');
            headerDiv.className = 'category-header';
            const titleSpan = document.createElement('span');
            titleSpan.className = 'category-title';
            titleSpan.innerText = cat.name;
            const iconSpan = document.createElement('span');
            iconSpan.className = 'collapse-icon';
            iconSpan.innerText = '▶'; // default collapsed
            headerDiv.appendChild(titleSpan);
            headerDiv.appendChild(iconSpan);
            const gridDiv = document.createElement('div');
            gridDiv.className = 'toc-grid collapsed'; // initially collapsed
            for (const id of cat.items) {
                const tocItem = document.createElement('div');
                tocItem.className = 'toc-item';
                tocItem.textContent = ARTICLES[id].title;
                tocItem.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const targetCard = document.getElementById(`card-${id}`);
                    if (targetCard) targetCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
                });
                gridDiv.appendChild(tocItem);
            }
            categoryDiv.appendChild(headerDiv);
            categoryDiv.appendChild(gridDiv);
            headerDiv.addEventListener('click', () => {
                const isCollapsed = gridDiv.classList.toggle('collapsed');
                iconSpan.innerText = isCollapsed ? '▶' : '▼';
            });
            tocContainer.appendChild(categoryDiv);
        }
    }

    function showDetail(articleId) {
        savedScrollPosition = window.scrollY;
        const article = ARTICLES[articleId];
        if (!article) return;
        detailContentDiv.innerHTML = `<div><div class="detail-title">${article.title}</div><div class="detail-meta">📌 ${article.meta}</div><div class="detail-text">${article.content}</div></div>`;
        homeContainer.classList.add('hidden');
        detailContainer.classList.remove('hidden');
        window.scrollTo({ top: 0, behavior: 'instant' });
        if (history.pushState) history.pushState({ view: 'detail', id: articleId }, '', `#${articleId}`);
    }

    function backToHome() {
        detailContainer.classList.add('hidden');
        homeContainer.classList.remove('hidden');
        setTimeout(() => window.scrollTo({ top: savedScrollPosition, behavior: 'instant' }), 10);
        if (location.hash) history.replaceState(null, '', ' ');
    }

    window.addEventListener('popstate', (e) => {
        if (!detailContainer.classList.contains('hidden')) backToHome();
        else if (location.hash && location.hash.length > 1) showDetail(location.hash.slice(1));
    });
    backBtn.addEventListener('click', backToHome);
    renderCards();
    if (location.hash && location.hash.length > 1) showDetail(location.hash.slice(1));
</script>
</body>
</html>
