            content: `<p>Your personal manager is your primary support. Use the following channels:</p><p><a href="https://t.me/lela303" class="contact-link">📱 Telegram Manager</a> <a href="https://signal.me/#eu/tXcYkeU9bWBQIzut_QGqiNT_fwwvJ1O-lFEKcJADXGy5PB9T_S9MiritEYbdHymQ" class="contact-link">🔒 Signal Manager</a></p><p>🕒 Working hours: 10am – 10pm (PNG time).</p><p>Your manager can help with deposits, withdrawals, task issues, upgrades, and any other questions.</p>`
        }
    };

    const CARD_LIST = [
        { id: "deposit-earnings", title: "💰 Deposit, Earnings & Why Deposit", desc: "Levels, daily pay, withdrawal limits, deposit explanation" },
        { id: "topup-steps", title: "🔁 Top‑Up Steps", desc: "How to add funds to your account" },
        { id: "withdrawal-rules", title: "🏦 Withdrawal Rules", desc: "Mon–Fri, 2–96h arrival" },
        { id: "order-process", title: "✅ Order Process (Task Steps)", desc: "Detailed simulation purchase flow" },
        { id: "extra-earnings", title: "💡 Extra Earnings", desc: "Invite bonuses, 0.2% rebate, team salary, tax subsidies" },
        { id: "what-is-pg", title: "🌐 What Is PG?", desc: "Company background, 80% profit share, 200M workers" },
        { id: "why-safe", title: "🔒 Why Is PG Safe?", desc: "Legal, insured, verifiable, certificate" },
        { id: "shipping-address", title: "📍 Shipping Address", desc: "Add address for tasks (with guide image)" },
        { id: "invite-friends", title: "👥 Invite Friends & Bonuses", desc: "Grow team, passive income, tax benefits" },
        { id: "contact-manager", title: "📞 Contact Manager", desc: "Telegram/Signal support" }
    ];

    const homeContainer = document.getElementById('homeContainer');
    const detailContainer = document.getElementById('detailContainer');
    const cardsArea = document.getElementById('cardsArea');
    const detailContentDiv = document.getElementById('detailContent');
    const backBtn = document.getElementById('backHomeBtn');

    function renderCards() {
        cardsArea.innerHTML = '';
        CARD_LIST.forEach(item => {
            const article = ARTICLES[item.id];
            const shortDesc = article?.meta || item.desc;
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<h3>${item.title}</h3><p>${shortDesc}</p><div class="badge">📘 Tap to expand →</div>`;
            card.addEventListener('click', () => showDetail(item.id));
            cardsArea.appendChild(card);
        });
    }

    function showDetail(articleId) {
        savedScrollPosition = window.scrollY;
        const article = ARTICLES[articleId];
        if (!article) return;
        detailContentDiv.innerHTML = `<div><div class="detail-title">${article.title}</div><div class="detail-meta">📌 ${article.meta}</div><div class="detail-text">${article.content}</div></div>`;
        homeContainer.classList.add('hidden');
        detailContainer.classList.remove('hidden');
        window.scrollTo({ top: 0, behavior: 'instant' });
        if (history.pushState) history.pushState({ view: 'detail', id: articleId }, '', `#${articleId}`);
    }

    function backToHome() {
        detailContainer.classList.add('hidden');
        homeContainer.classList.remove('hidden');
        setTimeout(() => window.scrollTo({ top: savedScrollPosition, behavior: 'instant' }), 10);
        if (location.hash) history.replaceState(null, '', ' ');
    }

    window.addEventListener('popstate', (e) => {
        if (!detailContainer.classList.contains('hidden')) backToHome();
        else if (location.hash && location.hash.length > 1) showDetail(location.hash.slice(1));
    });
    backBtn.addEventListener('click', backToHome);
    renderCards();
    if (location.hash && location.hash.length > 1) showDetail(location.hash.slice(1));
</script>
</body>
</html>
